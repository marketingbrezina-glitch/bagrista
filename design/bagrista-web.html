<!doctype html>
<html lang="cs" data-mode="light">
<head>
<meta charset="utf-8" />
<title>Bagrista — Vyznání víry</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Stencil+Display:wght@400;500;700;800;900&family=Big+Shoulders+Display:wght@400;500;700;800;900&family=Archivo+Black&family=Anton&family=Oswald:wght@300;400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css?v=light4" />
<style>
/* Cache-buster inline override — guarantees light mode */
:root {
  --bg: #F5F1E8 !important;
  --bg-2: #ECE6D5 !important;
  --bg-3: #DDD5BE !important;
  --fg: #1A140A !important;
  --fg-dim: #5A5040 !important;
  --fg-faint: #8A7E66 !important;
  --rule: #DDD5BE !important;
  --rule-dashed: #C9BFA6 !important;
  --slab-bg: #FBF7EC !important;
  --slab-fg: #1A140A !important;
  --slab-rule: #B8341A !important;
  --accent-num: #C8841A !important;
  --concrete: #5A5040 !important;
  --concrete-dim: #8A7E66 !important;
  --parchment-2: #ECE6D5 !important;
}
body { background: #F5F1E8 !important; color: #1A140A !important; }
.shell { background: #F5F1E8 !important; }
.topbar { background: #F5F1E8 !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="page-home.jsx"></script>
<script type="text/babel" src="page-bridge.jsx"></script>
<script type="text/babel" src="page-detail.jsx"></script>
<script type="text/babel" src="page-sekty.jsx"></script>
<script type="text/babel" src="page-slovnik.jsx"></script>
<script type="text/babel" src="page-modlitebnik.jsx"></script>
<script type="text/babel" src="page-kviz.jsx"></script>
<script type="text/babel" src="page-hubs.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;
const { TopBar, Footer, HomePage, BridgePage, DetailPage,
  SektyPage, SectKomatsuPage, GlossaryHub, ModlitebnikPage, QuizPage,
  MartyrsPage, MechanicsPage, HistoryPage } = window;
const { TweaksPanel, useTweaks, TweakSection, TweakColor, TweakSelect } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "primaryYellow": "#FFCD11",
  "rustAccent": "#B8341A",
  "headlineFont": "Big Shoulders Stencil",
  "bodyFont": "Source Serif 4"
}/*EDITMODE-END*/;

function App() {
  const [page, setPage] = useState('home');
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--zlut', tweaks.primaryYellow);
    root.style.setProperty('--rust', tweaks.rustAccent);

    const headlineMap = {
      'Big Shoulders Stencil': "'Big Shoulders Stencil Display', sans-serif",
      'Big Shoulders (solid)': "'Big Shoulders Display', sans-serif",
      'Archivo Black': "'Archivo Black', sans-serif",
      'Anton': "'Anton', sans-serif",
    };
    root.style.setProperty('--display', headlineMap[tweaks.headlineFont] || headlineMap['Big Shoulders Stencil']);

    const bodyMap = {
      'Source Serif 4': "'Source Serif 4', Georgia, serif",
      'EB Garamond': "'EB Garamond', Georgia, serif",
    };
    root.style.setProperty('--body', bodyMap[tweaks.bodyFont] || bodyMap['Source Serif 4']);
  }, [tweaks]);

  let pageEl;
  if (page === 'home')   pageEl = <HomePage onNav={setPage} />;
  else if (page === 'bridge') pageEl = <BridgePage onNav={setPage} />;
  else if (page === 'detail') pageEl = <DetailPage onNav={setPage} />;
  else if (page === 'sects') pageEl = <SektyPage onNav={setPage} />;
  else if (page === 'sect-komatsu') pageEl = <SectKomatsuPage onNav={setPage} />;
  else if (page === 'glossary') pageEl = <GlossaryHub onNav={setPage} />;
  else if (page === 'prayers') pageEl = <ModlitebnikPage onNav={setPage} />;
  else if (page === 'quiz') pageEl = <QuizPage onNav={setPage} />;
  else if (page === 'martyrs') pageEl = <MartyrsPage onNav={setPage} />;
  else if (page === 'mechanics') pageEl = <MechanicsPage onNav={setPage} />;
  else if (page === 'history') pageEl = <HistoryPage onNav={setPage} />;
  else {
    pageEl = (
      <main className="container" style={{ padding: '120px 28px', textAlign: 'center' }}>
        <div className="mono-caption" style={{ marginBottom: 16 }}>— V přípravě —</div>
        <h1 style={{ fontFamily: 'var(--display)', fontSize: 64, letterSpacing: '0.02em', color: 'var(--fg)' }}>
          KAPITOLA SE ZAPISUJE
        </h1>
        <button className="btn" onClick={() => setPage('home')} style={{marginTop: 32}}>Zpět na Homepage</button>
      </main>
    );
  }

  return (
    <div className="shell">
      <TopBar page={page} onNav={setPage} />
      {pageEl}
      <Footer onNav={setPage} />

      <TweaksPanel title="Tweaks · Bagrista">
        <TweakSection title="Barvy">
          <TweakColor label="Žluť (primární)" value={tweaks.primaryYellow}
            onChange={v => setTweak('primaryYellow', v)} />
          <TweakColor label="Rust (varování)" value={tweaks.rustAccent}
            onChange={v => setTweak('rustAccent', v)} />
        </TweakSection>

        <TweakSection title="Typografie">
          <TweakSelect label="Display / nadpisy"
            options={['Big Shoulders Stencil', 'Big Shoulders (solid)', 'Archivo Black', 'Anton']}
            value={tweaks.headlineFont}
            onChange={v => setTweak('headlineFont', v)} />
          <TweakSelect label="Body / čtecí"
            options={['Source Serif 4', 'EB Garamond']}
            value={tweaks.bodyFont}
            onChange={v => setTweak('bodyFont', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
